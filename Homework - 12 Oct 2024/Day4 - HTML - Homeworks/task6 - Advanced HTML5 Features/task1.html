<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ID Card Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            transition: background-color 0.3s;
        }

        #themeSelector {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .theme-box {
            width: 50px;
            height: 50px;
            border: 2px solid #ccc;
            border-radius: 5px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            transition: border-color 0.3s;
        }

        .dark-coffee {
            background-color: #4E3B31;
        }

        .light-blue {
            background-color: #AEEEEE;
        }

        .rainbow {
            background: linear-gradient(45deg, red, orange, yellow, green, blue, indigo, violet, red);
        }

        .id-card {
            width: 300px;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            background-color: white;
            text-align: center;
        }

        .id-card img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin-bottom: 10px;
        }

        .id-card h2 {
            margin: 10px 0;
            font-size: 24px;
        }

        .id-card p {
            margin: 5px 0;
            font-size: 16px;
        }

        .theme-title {
            font-size: 12px;
            margin-top: 5px;
            text-align: center;
        }
        .blurry{
            filter: blur(20px);
        }
    </style>
</head>
<body>



<div class="id-card">
    <img src="img.png" alt="Profile Photo">
    <h2>John Doe</h2>
    <p>ID: 123456</p>
    <p>Event: Sample Event</p>
    <p>Date: 2024-10-16</p>
    <p>Theme:</p>
    <div id="themeSelector">
        <div class="theme-box dark-coffee" data-theme="dark-coffee" title="Dark Coffee" onclick="changeTheme(this)"></div>
        <div class="theme-box light-blue" data-theme="light-blue" title="Light with Hint of Blue" onclick="changeTheme(this)"></div>
        <div class="theme-box rainbow" data-theme="rainbow" title="Rainbow" onclick="changeTheme(this)"></div>
    </div>
</div>

<script>
    // Get elements
    const body = document.body;

    // Function to set theme color
    function setThemeColor(color) {
        switch(color) {
            case 'dark-coffee':
                body.style.background = 'none' // Rainbow colors
                body.style.backgroundColor = '#4E3B31'; // Dark Coffee
                break;
            case 'light-blue':
                body.style.background = 'none' // Rainbow colors

                body.style.backgroundColor = '#AEEEEE'; // Light with hint of blue
                break;
            case 'rainbow':
                body.style.background = 'linear-gradient(45deg, red, orange, yellow, green, blue, indigo, violet, red)'; // Rainbow colors
                break;
            default:
                body.style.backgroundColor = '#FFFFFF'; // Default white
        }
    }

    // Load theme from localStorage
    window.onload = () => {
        const savedTheme = localStorage.getItem('themeColor');
        if (savedTheme) {
            setThemeColor(savedTheme);
            const selectedBox = document.querySelector(`.theme-box[data-theme="${savedTheme}"]`);
            selectedBox.style.borderColor = '#000'; // Highlight selected theme
        }
    };

    // Change theme and save to localStorage
    function changeTheme(themeBox) {
        const selectedTheme = themeBox.getAttribute('data-theme');
        localStorage.setItem('themeColor', selectedTheme);
        setThemeColor(selectedTheme);
        document.querySelectorAll('.theme-box').forEach(box => {
            box.style.borderColor = '#ccc'; // Reset border color for all
        });
        themeBox.style.borderColor = '#000'; // Highlight selected theme
    }
</script>

</body>
</html>
