<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Webpage</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f9f9f9;
            text-align: center;
        }
        .wrapper {
            margin: 20px auto;
            padding: 20px;
            width: 80%;
            max-width: 800px;
            background-color: #fff;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
        }
        h2 {
            margin-bottom: 15px;
        }
        img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
        }
        video, audio {
            width: 100%;
            border-radius: 8px;
            outline: none;
        }
        video {
            max-height: 400px;
        }
    </style>
</head>
<body>

<!-- Image Section -->
<div class="wrapper">
    <h2>Image Section</h2>
    <img src="img.png" alt="Image Description">
</div>

<!-- Video Section -->
<div class="wrapper">
    <h2>Video Section</h2>
    <video controls>
        <source src="video.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>
</div>

<!-- Audio Section -->
<div class="wrapper">
    <h2>Audio Section</h2>
    <audio controls>
        <source src="audio.mp3" type="audio/mp3">
        Your browser does not support the audio element.
    </audio>
</div>

</body>
</html>
